services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: ecommerce-kafka
    ports:
      - "9092:9092"
    environment:
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  mongo:
    image: mongo:7
    container_name: ecommerce-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: ecommerce-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 30s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: ecommerce-logstash
    ports:
      - "5044:5000"
      - "9600:9600"
    volumes:
      - ./observability/logstash/pipeline:/usr/share/logstash/pipeline
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9600 > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: ecommerce-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: ecommerce-kafka-ui
    ports:
      - "8088:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  graphql-api:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: graphql-api/Dockerfile
    container_name: ecommerce-graphql-api
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/graphql-db
      - LOGGING_LOGSTASH_HOST=logstash
      - LOGGING_LOGSTASH_PORT=5000
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
      logstash:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s

  api-gateway:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: ecommerce-api-gateway
    environment:
      - GRAPHQL_API_URI=http://graphql-api:8080
      - LOGGING_LOGSTASH_HOST=logstash
      - LOGGING_LOGSTASH_PORT=5000
    ports:
      - "8090:8090"
    depends_on:
      graphql-api:
        condition: service_healthy
      logstash:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8090/actuator/health > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s

  catalog-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    container_name: ecommerce-catalog-service
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/catalog-db
      - LOGGING_LOGSTASH_HOST=logstash
      - LOGGING_LOGSTASH_PORT=5000
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
      logstash:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s

  order-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: ecommerce-order-service
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/order-db
      - LOGGING_LOGSTASH_HOST=logstash
      - LOGGING_LOGSTASH_PORT=5000
    ports:
      - "8082:8082"
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
      logstash:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s

  inventory-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: ecommerce-inventory-service
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - LOGGING_LOGSTASH_HOST=logstash
      - LOGGING_LOGSTASH_PORT=5000
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      logstash:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s

  payment-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: ecommerce-payment-service
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/payment-db
      - LOGGING_LOGSTASH_HOST=logstash
      - LOGGING_LOGSTASH_PORT=5000
    ports:
      - "8084:8084"
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
      logstash:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s

  user-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: ecommerce-user-service
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/user-db
      - LOGGING_LOGSTASH_HOST=logstash
      - LOGGING_LOGSTASH_PORT=5000
    ports:
      - "8085:8085"
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
      logstash:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/actuator/health > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s

volumes:
  mongo_data:
  redis_data:
  elasticsearch_data:
